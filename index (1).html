<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Girl Money</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#E8A0B4"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --rose:     #E8A0B4;
      --rose-d:   #C97A94;
      --rose-l:   #FADADD;
      --mauve:    #C9ACD4;
      --mauve-l:  #EDE0F5;
      --cream:    #FFF8F0;
      --sand:     #F5E6D3;
      --text:     #4A3040;
      --text-s:   #7A5A6A;
      --green:    #7EBF8E;
      --green-l:  #D4EDDA;
      --red:      #D4778A;
      --red-l:    #FAE0E4;
      --white:    #FFFFFF;
      --shadow:   rgba(200,130,160,0.15);
      --radius:   18px;
      --radius-s: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    /* LOADING */
    #loading {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #FFF0F5 0%, #EDE0F5 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 999;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 600; color: var(--rose-d);
      letter-spacing: 1px;
    }
    #loading .tagline { font-size: 13px; color: var(--text-s); margin-top: 4px; }
    #loading .dots { margin-top: 24px; display: flex; gap: 8px; }
    #loading .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--rose); animation: blink 1.2s infinite ease-in-out;
    }
    #loading .dot:nth-child(2) { animation-delay:.2s; background: var(--mauve); }
    #loading .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.25;transform:scale(.75)} 40%{opacity:1;transform:scale(1)} }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, var(--rose) 0%, var(--mauve) 100%);
      padding: 52px 20px 28px;
      padding-top: calc(52px + env(safe-area-inset-top));
    }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 600; color: #fff; letter-spacing: 0.5px;
    }
    .header-date { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 3px; }

    /* BALANCE CARDS */
    .balances {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 20px 16px 0;
    }
    .bal-card {
      background: var(--white); border-radius: var(--radius);
      padding: 16px 14px; box-shadow: 0 4px 20px var(--shadow);
      position: relative; overflow: hidden;
    }
    .bal-card::after {
      content: ''; position: absolute;
      top: -24px; right: -24px;
      width: 80px; height: 80px; border-radius: 50%; opacity: .1;
    }
    .bal-card.bank::after { background: var(--mauve); }
    .bal-card.cash::after { background: var(--rose); }
    .bal-card .bc-icon { font-size: 22px; margin-bottom: 6px; }
    .bal-card .bc-label {
      font-size: 10px; font-weight: 500; color: var(--text-s);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .bal-card .bc-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 600; color: var(--text);
      margin-top: 5px; line-height: 1;
    }
    .bal-card .bc-amount small { font-size: 13px; }
    .bal-card .bc-edit {
      position: absolute; top: 10px; right: 10px;
      background: var(--sand); border: none; border-radius: 8px;
      width: 28px; height: 28px; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .total-strip {
      margin: 12px 16px 0;
      background: linear-gradient(135deg, var(--rose-l), var(--mauve-l));
      border-radius: var(--radius-s); padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .total-strip .ts-label { font-size: 13px; color: var(--text-s); font-weight: 500; }
    .total-strip .ts-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 600; color: var(--text);
    }

    /* SECTION HEADER */
    .sec-hdr {
      display: flex; justify-content: space-between; align-items: center;
      padding: 26px 16px 12px;
    }
    .sec-hdr h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 600;
    }
    .btn-new-cat {
      background: var(--rose); color: #fff; border: none;
      border-radius: 20px; padding: 7px 16px;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }

    /* CATEGORIES */
    .cats { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--text-s); font-size: 14px; line-height: 1.7;
    }
    .empty-state .ei { font-size: 44px; margin-bottom: 10px; }

    .cat-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: 0 4px 16px var(--shadow); overflow: hidden;
    }
    .cat-hdr {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; cursor: pointer; user-select: none;
    }
    .cat-hdr .ch-emoji { font-size: 24px; }
    .cat-hdr .ch-info { flex: 1; min-width: 0; }
    .cat-hdr .ch-name { font-weight: 500; font-size: 15px; }
    .cat-hdr .ch-sub {
      font-size: 11px; color: var(--text-s); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bar-wrap { margin-top: 5px; }
    .bar-bg { background: var(--sand); border-radius: 4px; height: 5px; overflow: hidden; }
    .bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--rose), var(--mauve));
      transition: width .4s ease;
    }
    .bar-fill.over { background: linear-gradient(90deg, var(--red), #D4A07A); }
    .bar-nums {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--text-s); margin-top: 2px;
    }
    .ch-chevron {
      font-size: 11px; color: var(--text-s);
      transition: transform .3s; flex-shrink: 0;
    }
    .ch-chevron.open { transform: rotate(180deg); }

    .cat-body { display: none; border-top: 1px solid var(--sand); }
    .cat-body.open { display: block; }
    .cat-body-inner { padding: 16px; }

    /* Budget row */
    .budget-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .budget-row label { font-size: 12px; color: var(--text-s); flex: 1; }
    .budget-row input {
      width: 100px; background: var(--sand); border: none;
      border-radius: 8px; padding: 7px 10px; font-size: 14px;
      color: var(--text); text-align: right; font-family: 'DM Sans', sans-serif;
    }
    .budget-row .btn-set {
      background: var(--mauve); color: #fff; border: none;
      border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer;
    }

    /* Tx buttons */
    .tx-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tx-btn {
      border: none; border-radius: var(--radius-s);
      padding: 11px 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .tx-btn.g { background: var(--red-l); color: var(--red); }
    .tx-btn.i { background: var(--green-l); color: #3A7A50; }

    /* Transactions history */
    .tx-list { margin-top: 16px; }
    .tx-list h4 {
      font-size: 11px; color: var(--text-s); text-transform: uppercase;
      letter-spacing: .7px; margin-bottom: 8px;
    }
    .tx-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--sand);
    }
    .tx-row:last-child { border-bottom: none; }
    .tx-row .tr-desc { flex: 1; }
    .tx-row .tr-name { font-size: 13px; color: var(--text); }
    .tx-row .tr-meta { font-size: 11px; color: var(--text-s); margin-top: 1px; }
    .tx-row .tr-amt { font-size: 13px; font-weight: 500; }
    .tx-row .tr-amt.g { color: var(--red); }
    .tx-row .tr-amt.i { color: var(--green); }
    .tx-row .tr-del {
      background: none; border: none; font-size: 15px;
      color: var(--text-s); cursor: pointer; padding: 2px 4px;
    }

    /* Cat actions */
    .cat-actions {
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid var(--sand);
      display: flex; gap: 8px;
    }
    .btn-del-cat {
      background: var(--red-l); color: var(--red);
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 12px; cursor: pointer;
    }

    /* MODALS */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(74,48,64,.45); backdrop-filter: blur(5px);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      width: 100%; max-width: 480px;
      animation: slideUp .3s ease;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; margin-bottom: 18px; color: var(--text);
    }
    .modal label {
      display: block; font-size: 11px; color: var(--text-s);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 5px;
    }
    .modal input, .modal select {
      width: 100%; background: var(--sand); border: none;
      border-radius: 10px; padding: 12px 14px; font-size: 15px;
      color: var(--text); margin-bottom: 14px;
      font-family: 'DM Sans', sans-serif; outline: none;
    }
    .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-cancel {
      background: var(--sand); color: var(--text-s); border: none;
      border-radius: 10px; padding: 13px; font-size: 15px; cursor: pointer;
    }
    .btn-ok {
      background: linear-gradient(135deg, var(--rose), var(--mauve));
      color: #fff; border: none; border-radius: 10px;
      padding: 13px; font-size: 15px; font-weight: 500; cursor: pointer;
    }

    /* Pills */
    .pills { display: flex; gap: 8px; margin-bottom: 14px; }
    .pill {
      flex: 1; padding: 10px 6px; border-radius: 10px;
      border: 2px solid var(--sand); background: var(--sand);
      font-size: 13px; font-weight: 500; cursor: pointer;
      text-align: center; color: var(--text-s); transition: all .2s;
    }
    .pill.sel-gasto   { border-color:var(--red);   background:var(--red-l);   color:var(--red); }
    .pill.sel-ingreso { border-color:var(--green);  background:var(--green-l); color:#3A7A50; }
    .pill.sel-bank    { border-color:var(--mauve);  background:var(--mauve-l); color:var(--text); }
    .pill.sel-cash    { border-color:var(--rose);   background:var(--rose-l);  color:var(--text); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: #fff;
      border-radius: 20px; padding: 10px 22px;
      font-size: 13px; opacity: 0; pointer-events: none;
      transition: all .3s; white-space: nowrap; z-index: 500;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="logo">💸 Girl Money</div>
  <div class="tagline">tu dinero, tu control</div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>💸 Girl Money</h1>
      <div class="header-date" id="hdr-date"></div>
    </div>
  </div>
</div>

<!-- Balances -->
<div class="balances">
  <div class="bal-card bank">
    <button class="bc-edit" onclick="openEditBal('bank')">✏️</button>
    <div class="bc-icon">🏦</div>
    <div class="bc-label">Cuenta corriente</div>
    <div class="bc-amount" id="bank-amt"><small>€</small> 0,00</div>
  </div>
  <div class="bal-card cash">
    <button class="bc-edit" onclick="openEditBal('cash')">✏️</button>
    <div class="bc-icon">💵</div>
    <div class="bc-label">Efectivo</div>
    <div class="bc-amount" id="cash-amt"><small>€</small> 0,00</div>
  </div>
</div>
<div class="total-strip">
  <div class="ts-label">💰 Total disponible</div>
  <div class="ts-amount" id="total-amt">€ 0,00</div>
</div>

<!-- Categories -->
<div class="sec-hdr">
  <h2>Categorías</h2>
  <button class="btn-new-cat" onclick="openAddCat()">＋ Nueva</button>
</div>
<div class="cats" id="cats-list">
  <div class="empty-state">
    <div class="ei">🌷</div>
    Añade tu primera categoría<br>para empezar a gestionar tus gastos
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- MODAL: editar saldo -->
<div class="modal-bg" id="m-bal">
  <div class="modal">
    <h3 id="m-bal-title">Editar saldo</h3>
    <label>Saldo actual (€)</label>
    <input type="number" id="m-bal-input" step="0.01" placeholder="0.00"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('m-bal')">Cancelar</button>
      <button class="btn-ok" onclick="saveBal()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL: nueva categoría -->
<div class="modal-bg" id="m-cat">
  <div class="modal">
    <h3>Nueva categoría</h3>
    <label>Emoji</label>
    <input type="text" id="m-cat-emoji" maxlength="2" placeholder="🛒"/>
    <label>Nombre</label>
    <input type="text" id="m-cat-name" placeholder="Supermercado"/>
    <label>Presupuesto inicial (€)</label>
    <input type="number" id="m-cat-budget" step="0.01" placeholder="0.00"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('m-cat')">Cancelar</button>
      <button class="btn-ok" onclick="saveCat()">Crear</button>
    </div>
  </div>
</div>

<!-- MODAL: transacción -->
<div class="modal-bg" id="m-tx">
  <div class="modal">
    <h3 id="m-tx-title">Nueva transacción</h3>
    <label>Tipo</label>
    <div class="pills">
      <div class="pill sel-gasto" id="p-gasto" onclick="selType('gasto')">📤 Gasto</div>
      <div class="pill" id="p-ingreso" onclick="selType('ingreso')">📥 Ingreso</div>
    </div>
    <label>Cuenta</label>
    <div class="pills">
      <div class="pill sel-bank" id="p-bank" onclick="selAcc('bank')">🏦 Corriente</div>
      <div class="pill" id="p-cash" onclick="selAcc('cash')">💵 Efectivo</div>
    </div>
    <label>Descripción (opcional)</label>
    <input type="text" id="m-tx-desc" placeholder="p.ej. Compra del viernes"/>
    <label>Cantidad (€)</label>
    <input type="number" id="m-tx-amt" step="0.01" min="0.01" placeholder="0.00"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('m-tx')">Cancelar</button>
      <button class="btn-ok" onclick="saveTx()">Añadir</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, get, update }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ┌─────────────────────────────────────────────────────────────┐
// │  🔑  CONFIGURA AQUÍ TU FIREBASE                             │
// │  Proyecto: listify-16b5d  (u otro si prefieres uno nuevo)   │
// └─────────────────────────────────────────────────────────────┘
const FB = {
  apiKey:            "AIzaSyChMXx5ZcleAo5oqzPvo1K_Af_wgQkh-LQ",
  authDomain:        "listify-16b5d.firebaseapp.com",
  databaseURL:       "https://listify-16b5d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "listify-16b5d",
  storageBucket:     "listify-16b5d.firebasestorage.app",
  messagingSenderId: "238610923350",
  appId:             "1:238610923350:web:cd5c2c3fb23b5c0afba0f7"
};

const app = getApps().length ? getApps()[0] : initializeApp(FB);
const db  = getDatabase(app);
const ROOT = 'girl-money';   // nodo raíz en Firebase

// ── Estado local ──────────────────────────────────────────────
let state = { bank: 0, cash: 0, categories: {} };
let editingBalType = 'bank';
let txCatId = null;
let txType  = 'gasto';
let txAcc   = 'bank';

// ── Firebase ──────────────────────────────────────────────────
function fbRef(path) { return ref(db, `${ROOT}/${path}`); }

function saveState() {
  set(fbRef('data'), state);
}

// ── Init ──────────────────────────────────────────────────────
onValue(fbRef('data'), snap => {
  const val = snap.val();
  if (val) {
    state = val;
    // normalizar categories por si Firebase convirtió arrays
    if (!state.categories) state.categories = {};
    Object.keys(state.categories).forEach(id => {
      const c = state.categories[id];
      if (!c.transactions) c.transactions = {};
    });
  }
  renderAll();
  document.getElementById('loading').classList.add('hidden');
}, { onlyOnce: false });

// Fallback timeout para ocultar loading si Firebase tarda
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 4000);

// ── Render ────────────────────────────────────────────────────
function fmt(n) {
  return (parseFloat(n) || 0).toFixed(2).replace('.', ',');
}
function fmtE(n) { return `€ ${fmt(n)}`; }

function renderBalances() {
  document.getElementById('bank-amt').innerHTML = `<small>€</small> ${fmt(state.bank)}`;
  document.getElementById('cash-amt').innerHTML = `<small>€</small> ${fmt(state.cash)}`;
  document.getElementById('total-amt').textContent = fmtE((state.bank||0) + (state.cash||0));
}

function renderCats() {
  const el = document.getElementById('cats-list');
  const cats = state.categories || {};
  const ids = Object.keys(cats);
  if (!ids.length) {
    el.innerHTML = `<div class="empty-state"><div class="ei">🌷</div>
      Añade tu primera categoría<br>para empezar a gestionar tus gastos</div>`;
    return;
  }
  el.innerHTML = ids.map(id => buildCatHTML(id, cats[id])).join('');
}

function buildCatHTML(id, cat) {
  const txs = cat.transactions || {};
  const txArr = Object.values(txs).sort((a,b) => b.ts - a.ts);
  const budget = parseFloat(cat.budget) || 0;
  const spent  = txArr.filter(t => t.type === 'gasto').reduce((s,t) => s + parseFloat(t.amount||0), 0);
  const earned = txArr.filter(t => t.type === 'ingreso').reduce((s,t) => s + parseFloat(t.amount||0), 0);
  const net    = spent - earned;    // gasto neto sobre el presupuesto
  const pct    = budget > 0 ? Math.min((net/budget)*100, 100) : 0;
  const over   = net > budget && budget > 0;

  const txRows = txArr.slice(0, 10).map(tx => {
    const acc = tx.account === 'bank' ? '🏦' : '💵';
    const sign = tx.type === 'gasto' ? '-' : '+';
    const cls  = tx.type === 'gasto' ? 'g' : 'i';
    const desc = tx.desc || (tx.type === 'gasto' ? 'Gasto' : 'Ingreso');
    const date = tx.ts ? new Date(tx.ts).toLocaleDateString('es-ES', {day:'2-digit',month:'short'}) : '';
    return `<div class="tx-row">
      <div class="tr-desc">
        <div class="tr-name">${esc(desc)}</div>
        <div class="tr-meta">${acc} · ${date}</div>
      </div>
      <div class="tr-amt ${cls}">${sign}€${fmt(tx.amount)}</div>
      <button class="tr-del" onclick="delTx('${id}','${tx.id}')">🗑</button>
    </div>`;
  }).join('');

  return `<div class="cat-card" id="cat-${id}">
    <div class="cat-hdr" onclick="toggleCat('${id}')">
      <div class="ch-emoji">${esc(cat.emoji||'📂')}</div>
      <div class="ch-info">
        <div class="ch-name">${esc(cat.name)}</div>
        <div class="bar-wrap">
          <div class="bar-bg">
            <div class="bar-fill ${over?'over':''}" style="width:${pct}%"></div>
          </div>
          <div class="bar-nums">
            <span>Gastado: €${fmt(net)}</span>
            <span>Presup.: €${fmt(budget)}</span>
          </div>
        </div>
      </div>
      <div class="ch-chevron" id="chev-${id}">▼</div>
    </div>
    <div class="cat-body" id="body-${id}">
      <div class="cat-body-inner">
        <div class="budget-row">
          <label>Presupuesto (€)</label>
          <input type="number" id="bud-${id}" value="${budget||''}" placeholder="0.00" step="0.01"/>
          <button class="btn-set" onclick="setBudget('${id}')">Fijar</button>
        </div>
        <div class="tx-btns">
          <button class="tx-btn g" onclick="openTx('${id}','gasto')">📤 Añadir gasto</button>
          <button class="tx-btn i" onclick="openTx('${id}','ingreso')">📥 Añadir ingreso</button>
        </div>
        ${txArr.length ? `<div class="tx-list"><h4>Últimas transacciones</h4>${txRows}</div>` : ''}
        <div class="cat-actions">
          <button class="btn-del-cat" onclick="delCat('${id}')">🗑 Eliminar categoría</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderAll() {
  renderBalances();
  renderCats();
  updateDate();
}

function updateDate() {
  const d = new Date();
  document.getElementById('hdr-date').textContent =
    d.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});
}

// ── Helpers ───────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
window.toast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
window.closeModal = function(id) {
  document.getElementById(id).classList.remove('open');
}
window.openModal = function(id) {
  document.getElementById(id).classList.add('open');
}

// ── Saldos ────────────────────────────────────────────────────
window.openEditBal = function(type) {
  editingBalType = type;
  document.getElementById('m-bal-title').textContent =
    type === 'bank' ? '🏦 Editar cuenta corriente' : '💵 Editar efectivo';
  document.getElementById('m-bal-input').value = state[type] || '';
  openModal('m-bal');
};
window.saveBal = function() {
  const v = parseFloat(document.getElementById('m-bal-input').value);
  if (isNaN(v)) { toast('Introduce una cantidad válida'); return; }
  state[editingBalType] = v;
  saveState();
  closeModal('m-bal');
  toast('Saldo actualizado ✓');
};

// ── Categorías ────────────────────────────────────────────────
window.openAddCat = function() {
  document.getElementById('m-cat-emoji').value = '';
  document.getElementById('m-cat-name').value = '';
  document.getElementById('m-cat-budget').value = '';
  openModal('m-cat');
};
window.saveCat = function() {
  const emoji  = document.getElementById('m-cat-emoji').value.trim() || '📂';
  const name   = document.getElementById('m-cat-name').value.trim();
  const budget = parseFloat(document.getElementById('m-cat-budget').value) || 0;
  if (!name) { toast('El nombre es obligatorio'); return; }
  const id = uid();
  if (!state.categories) state.categories = {};
  state.categories[id] = { emoji, name, budget, transactions: {} };
  saveState();
  closeModal('m-cat');
  toast(`${emoji} ${name} creada ✓`);
};
window.delCat = function(id) {
  if (!confirm('¿Eliminar esta categoría y todas sus transacciones?')) return;
  delete state.categories[id];
  saveState();
  toast('Categoría eliminada');
};
window.toggleCat = function(id) {
  const body = document.getElementById(`body-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
};
window.setBudget = function(id) {
  const v = parseFloat(document.getElementById(`bud-${id}`).value);
  if (isNaN(v) || v < 0) { toast('Cantidad inválida'); return; }
  state.categories[id].budget = v;
  saveState();
  toast('Presupuesto actualizado ✓');
};

// ── Transacciones ─────────────────────────────────────────────
window.openTx = function(catId, type) {
  txCatId = catId;
  txType  = type;
  txAcc   = 'bank';
  document.getElementById('m-tx-title').textContent =
    type === 'gasto' ? '📤 Añadir gasto' : '📥 Añadir ingreso';
  document.getElementById('m-tx-desc').value = '';
  document.getElementById('m-tx-amt').value  = '';
  // reset pills
  selType(type);
  selAcc('bank');
  openModal('m-tx');
};
window.selType = function(t) {
  txType = t;
  document.getElementById('p-gasto').className   = 'pill' + (t==='gasto'   ? ' sel-gasto'   : '');
  document.getElementById('p-ingreso').className  = 'pill' + (t==='ingreso' ? ' sel-ingreso' : '');
};
window.selAcc = function(a) {
  txAcc = a;
  document.getElementById('p-bank').className = 'pill' + (a==='bank' ? ' sel-bank' : '');
  document.getElementById('p-cash').className = 'pill' + (a==='cash' ? ' sel-cash' : '');
};
window.saveTx = function() {
  const amt  = parseFloat(document.getElementById('m-tx-amt').value);
  const desc = document.getElementById('m-tx-desc').value.trim();
  if (isNaN(amt) || amt <= 0) { toast('Introduce una cantidad válida'); return; }

  const id = uid();
  const tx = { id, type: txType, account: txAcc, amount: amt, desc, ts: Date.now() };

  if (!state.categories[txCatId].transactions) state.categories[txCatId].transactions = {};
  state.categories[txCatId].transactions[id] = tx;

  // Actualizar saldo de la cuenta
  if (txType === 'gasto')   state[txAcc] = (state[txAcc]||0) - amt;
  if (txType === 'ingreso') state[txAcc] = (state[txAcc]||0) + amt;

  saveState();
  closeModal('m-tx');
  toast(txType === 'gasto' ? `−€${amt.toFixed(2)} registrado ✓` : `+€${amt.toFixed(2)} registrado ✓`);
};
window.delTx = function(catId, txId) {
  const tx = state.categories[catId].transactions[txId];
  if (!tx) return;
  // Revertir saldo
  if (tx.type === 'gasto')   state[tx.account] = (state[tx.account]||0) + parseFloat(tx.amount);
  if (tx.type === 'ingreso') state[tx.account] = (state[tx.account]||0) - parseFloat(tx.amount);
  delete state.categories[catId].transactions[txId];
  saveState();
  toast('Transacción eliminada');
};

// ── Cerrar modales tocando el fondo ──────────────────────────
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => {
    if (e.target === bg) bg.classList.remove('open');
  });
});

// ── Service Worker ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
